<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyBuddy AI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <div class="container">
    <h1>📚 StudyBuddy AI</h1>

    <textarea id="inputText" placeholder="Select text from any webpage..."></textarea>

    <div class="buttons">
      <button id="summarizeBtn">Summarize</button>
      <button id="explainBtn">Explain</button>
      <button id="quizBtn">Quiz</button>
      <button id="saveBtn">Save</button>
    </div>

    <div id="output" class="output">Output will appear here...</div>

    <div class="history-controls">
      <button id="viewSavedBtn">Load Saved Notes</button>
      <button id="clearSavedBtn">Clear History</button>
    </div>

    <div id="savedNotesContainer" class="saved-notes"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
